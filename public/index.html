<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💀 BLACK PHANTOM - Ultimate Load Tester</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: 'Courier New', monospace; color: #0f0; padding: 20px; }
    .container { max-width: 1200px; margin: auto; }
    h1 { text-align: center; margin-bottom: 20px; text-shadow: 0 0 5px #0f0; }
    .card { background: #111; border: 1px solid #0f0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    input, button { background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; border-radius: 5px; }
    button { cursor: pointer; font-weight: bold; }
    button:hover { background: #0f0; color: #000; }
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-top: 20px; }
    .stat { background: #000; padding: 10px; text-align: center; border: 1px solid #0f0; }
    .log { background: #000; border: 1px solid #0f0; height: 250px; overflow-y: scroll; padding: 10px; font-family: monospace; font-size: 12px; margin-top: 20px; }
    .log p { margin: 2px 0; }
    .stop-btn { background: #f00; color: #fff; border-color: #f00; }
    .stop-btn:hover { background: #a00; }
  </style>
</head>
<body>
<div class="container">
  <h1>💀 BLACK PHANTOM LOAD TESTER 💀</h1>
  <div class="card">
    <label>Target URL:</label><br>
    <input type="text" id="url" value="https://example.com" style="width: 100%;"><br>
    <label>Connections (1-10000):</label><input type="number" id="connections" value="100"><br>
    <label>Duration (seconds):</label><input type="number" id="duration" value="10"><br>
    <label>Pipelining (1-10):</label><input type="number" id="pipelining" value="1"><br>
    <label>Workers (1-4):</label><input type="number" id="workers" value="1"><br>
    <button id="attackBtn">🔥 LAUNCH ATTACK</button>
    <button id="stopBtn" class="stop-btn" disabled>⏹ STOP ATTACK</button>
  </div>
  <div id="result" style="display:none;" class="card">
    <h2>📊 RESULT</h2>
    <div class="stats">
      <div class="stat">Total Requests<br><span id="total">0</span></div>
      <div class="stat">Avg RPS<br><span id="rps">0</span></div>
      <div class="stat">Avg Latency<br><span id="avgLat">0 ms</span></div>
      <div class="stat">Max Latency<br><span id="maxLat">0 ms</span></div>
      <div class="stat">p99 Latency<br><span id="p99">0 ms</span></div>
      <div class="stat">Errors<br><span id="errors">0</span></div>
      <div class="stat">Throughput<br><span id="throughput">0 MB/s</span></div>
    </div>
  </div>
  <div class="card">
    <h2>📡 LIVE LOG</h2>
    <div id="log" class="log">[system] Ready</div>
  </div>
</div>
<script>
  const attackBtn = document.getElementById('attackBtn');
  const stopBtn = document.getElementById('stopBtn');
  const resultDiv = document.getElementById('result');
  const logDiv = document.getElementById('log');
  let eventSource = null;

  function addLog(msg) {
    const p = document.createElement('p');
    p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  // Setup SSE untuk live log
  function setupEventSource() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/stream');
    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'start') addLog(data.message);
      else if (data.type === 'progress') {
        addLog(`📊 Requests: ${data.requests} | RPS: ${data.rps} | Errors: ${data.errors}`);
      } else if (data.type === 'done') {
        addLog('✅ Attack completed successfully.');
        stopBtn.disabled = true;
        attackBtn.disabled = false;
      } else if (data.type === 'stop') {
        addLog(data.message);
        stopBtn.disabled = true;
        attackBtn.disabled = false;
      }
    };
    eventSource.onerror = () => {
      addLog('⚠️ SSE connection lost, but attack may still be running.');
    };
  }

  attackBtn.onclick = async () => {
    const url = document.getElementById('url').value.trim();
    if (!url) return addLog('❌ URL kosong!');
    const connections = document.getElementById('connections').value;
    const duration = document.getElementById('duration').value;
    const pipelining = document.getElementById('pipelining').value;
    const workers = document.getElementById('workers').value;
    attackBtn.disabled = true;
    stopBtn.disabled = false;
    resultDiv.style.display = 'none';
    addLog(`🚀 Sending attack request to ${url} (conn=${connections}, dur=${duration}s)`);
    setupEventSource(); // start listening to live logs
    try {
      const response = await fetch('/api/attack', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, connections, duration, pipelining, workers })
      });
      const data = await response.json();
      if (data.success) {
        addLog('✅ Attack finished. Displaying final stats.');
        displayResults(data.stats);
        stopBtn.disabled = true;
        attackBtn.disabled = false;
        if (eventSource) eventSource.close();
      } else {
        addLog(`❌ Error: ${data.error}`);
        stopBtn.disabled = true;
        attackBtn.disabled = false;
        if (eventSource) eventSource.close();
      }
    } catch (err) {
      addLog(`❌ Request gagal: ${err.message}`);
      stopBtn.disabled = true;
      attackBtn.disabled = false;
      if (eventSource) eventSource.close();
    }
  };

  stopBtn.onclick = async () => {
    addLog('⏹ Sending stop command...');
    try {
      const res = await fetch('/api/stop', { method: 'POST' });
      const data = await res.json();
      addLog(data.message);
    } catch (err) {
      addLog(`❌ Stop failed: ${err.message}`);
    } finally {
      stopBtn.disabled = true;
      attackBtn.disabled = false;
    }
  };

  function displayResults(stats) {
    document.getElementById('total').innerText = stats.requests.toLocaleString();
    document.getElementById('rps').innerText = Math.round(stats.avgRps);
    document.getElementById('avgLat').innerText = Math.round(stats.avgLatency) + ' ms';
    document.getElementById('maxLat').innerText = Math.round(stats.maxLatency) + ' ms';
    document.getElementById('p99').innerText = Math.round(stats.p99) + ' ms';
    document.getElementById('errors').innerText = stats.errors;
    const mbps = (stats.throughput / 1024 / 1024).toFixed(2);
    document.getElementById('throughput').innerText = mbps + ' MB/s';
    resultDiv.style.display = 'block';
  }
</script>
</body>
</html>
