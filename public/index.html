<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>💀 BLACK PHANTOM - Web Load Tester</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      font-family: 'Courier New', monospace;
      color: #0f0;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: auto; }
    h1 { text-align: center; margin-bottom: 20px; text-shadow: 0 0 5px #0f0; }
    .card {
      background: #111;
      border: 1px solid #0f0;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 20px;
    }
    input, button {
      background: #222;
      border: 1px solid #0f0;
      color: #0f0;
      padding: 10px;
      margin: 5px;
      border-radius: 5px;
      font-family: monospace;
    }
    button {
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #0f0; color: #000; }
    .stop-btn { background: #f00; color: #fff; border-color: #f00; }
    .stop-btn:hover { background: #a00; }
    input { width: 100%; margin-bottom: 10px; }
    .form-row { display: flex; gap: 10px; }
    .form-row input { flex: 1; }
    .stats-live {
      display: flex;
      gap: 20px;
      justify-content: space-around;
      margin-bottom: 20px;
    }
    .stat-card {
      background: #000;
      border: 1px solid #0f0;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      flex: 1;
    }
    .stat-value {
      font-size: 2em;
      font-weight: bold;
    }
    .log {
      background: #000;
      border: 1px solid #0f0;
      height: 300px;
      overflow-y: scroll;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .log p { margin: 2px 0; }
    .final-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
      gap: 10px;
      margin-top: 15px;
    }
    .final-stat {
      background: #000;
      padding: 10px;
      text-align: center;
      border: 1px solid #0f0;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>💀 BLACK PHANTOM LOAD TESTER 💀</h1>
  <div class="card">
    <label>Target URL:</label>
    <input type="text" id="url" placeholder="https://example.com" value="https://example.com">
    <div class="form-row">
      <input type="number" id="connections" placeholder="Connections" value="100">
      <input type="number" id="duration" placeholder="Duration (s)" value="10">
    </div>
    <div class="form-row">
      <input type="number" id="pipelining" placeholder="Pipelining" value="1">
      <input type="number" id="workers" placeholder="Workers" value="1">
    </div>
    <button id="attackBtn">🔥 LAUNCH ATTACK</button>
    <button id="stopBtn" class="stop-btn" disabled>⏹ STOP ATTACK</button>
  </div>

  <div class="card">
    <h2>📊 LIVE STATISTICS</h2>
    <div class="stats-live">
      <div class="stat-card">Total Requests<br><span id="liveRequests" class="stat-value">0</span></div>
      <div class="stat-card">Current RPS<br><span id="liveRps" class="stat-value">0</span></div>
      <div class="stat-card">Errors<br><span id="liveErrors" class="stat-value">0</span></div>
    </div>
  </div>

  <div class="card">
    <h2>📡 LIVE LOG</h2>
    <div id="log" class="log">[system] Ready</div>
  </div>

  <div id="finalCard" class="card" style="display:none;">
    <h2>📊 FINAL STATISTICS</h2>
    <div class="final-stats">
      <div class="final-stat">Total Requests<br><span id="total">0</span></div>
      <div class="final-stat">Avg RPS<br><span id="avgRps">0</span></div>
      <div class="final-stat">Avg Latency<br><span id="avgLat">0 ms</span></div>
      <div class="final-stat">Max Latency<br><span id="maxLat">0 ms</span></div>
      <div class="final-stat">p99 Latency<br><span id="p99">0 ms</span></div>
      <div class="final-stat">Errors<br><span id="errors">0</span></div>
      <div class="final-stat">Throughput<br><span id="throughput">0 MB/s</span></div>
    </div>
  </div>
</div>

<script>
  let eventSource = null;
  let attackInProgress = false;

  const attackBtn = document.getElementById('attackBtn');
  const stopBtn = document.getElementById('stopBtn');
  const logDiv = document.getElementById('log');
  const finalCard = document.getElementById('finalCard');

  function addLog(msg) {
    const p = document.createElement('p');
    p.textContent = msg;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  function setupEventSource() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/stream');
    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'log') {
        addLog(data.message);
      } else if (data.type === 'stats') {
        document.getElementById('liveRequests').innerText = data.stats.requests.toLocaleString();
        document.getElementById('liveRps').innerText = Math.round(data.stats.rps);
        document.getElementById('liveErrors').innerText = data.stats.errors;
      } else if (data.type === 'done') {
        addLog('✅ Attack completed. Fetching final stats...');
      }
    };
    eventSource.onerror = () => {
      addLog('⚠️ Live log connection lost.');
    };
  }

  attackBtn.onclick = async () => {
    if (attackInProgress) return;
    const url = document.getElementById('url').value.trim();
    if (!url) return addLog('❌ URL kosong!');
    const connections = document.getElementById('connections').value;
    const duration = document.getElementById('duration').value;
    const pipelining = document.getElementById('pipelining').value;
    const workers = document.getElementById('workers').value;
    attackBtn.disabled = true;
    stopBtn.disabled = false;
    finalCard.style.display = 'none';
    attackInProgress = true;
    addLog(`🚀 Sending attack request to ${url} (conn=${connections}, dur=${duration}s)`);
    setupEventSource();
    try {
      const response = await fetch('/api/attack', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, connections, duration, pipelining, workers })
      });
      const data = await response.json();
      if (data.success) {
        addLog('✅ Attack finished. Displaying final stats.');
        displayFinalStats(data.stats);
      } else {
        addLog(`❌ Error: ${data.error}`);
      }
    } catch (err) {
      addLog(`❌ Request failed: ${err.message}`);
    } finally {
      attackInProgress = false;
      attackBtn.disabled = false;
      stopBtn.disabled = true;
      if (eventSource) eventSource.close();
    }
  };

  stopBtn.onclick = async () => {
    addLog('⏹ Sending stop command...');
    try {
      const res = await fetch('/api/stop', { method: 'POST' });
      const data = await res.json();
      addLog(data.message || 'Stopped');
    } catch (err) {
      addLog(`❌ Stop failed: ${err.message}`);
    } finally {
      attackInProgress = false;
      attackBtn.disabled = false;
      stopBtn.disabled = true;
    }
  };

  function displayFinalStats(stats) {
    document.getElementById('total').innerText = stats.requests.toLocaleString();
    document.getElementById('avgRps').innerText = Math.round(stats.avgRps);
    document.getElementById('avgLat').innerText = Math.round(stats.avgLatency) + ' ms';
    document.getElementById('maxLat').innerText = Math.round(stats.maxLatency) + ' ms';
    document.getElementById('p99').innerText = Math.round(stats.p99) + ' ms';
    document.getElementById('errors').innerText = stats.errors;
    const mbps = (stats.throughput / 1024 / 1024).toFixed(2);
    document.getElementById('throughput').innerText = mbps + ' MB/s';
    finalCard.style.display = 'block';
  }
</script>
</body>
</html>
