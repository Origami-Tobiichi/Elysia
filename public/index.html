<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💀 BLACK PHANTOM - Ultimate Load Tester</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; font-family: 'Courier New', monospace; color: #0f0; padding: 20px; }
    .container { max-width: 1400px; margin: auto; }
    h1 { text-align: center; margin-bottom: 20px; text-shadow: 0 0 5px #0f0; }
    .card { background: #111; border: 1px solid #0f0; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
    input, button { background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px; border-radius: 5px; font-family: monospace; }
    button { cursor: pointer; font-weight: bold; }
    button:hover { background: #0f0; color: #000; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 10px; margin-bottom: 20px; }
    .stat { background: #000; padding: 10px; text-align: center; border: 1px solid #0f0; }
    .stat-label { font-size: 12px; text-transform: uppercase; }
    .stat-value { font-size: 24px; font-weight: bold; }
    .log { background: #000; border: 1px solid #0f0; height: 400px; overflow-y: scroll; padding: 10px; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    .log p { margin: 2px 0; font-family: monospace; }
    .stop-btn { background: #f00; color: #fff; border-color: #f00; }
    .stop-btn:hover { background: #a00; }
    input { width: 100%; margin-bottom: 10px; }
    .form-row { display: flex; gap: 10px; }
    .form-row input { flex: 1; }
  </style>
</head>
<body>
<div class="container">
  <h1>💀 BLACK PHANTOM LOAD TESTER 💀</h1>
  <div class="card">
    <label>Target URL:</label>
    <input type="text" id="url" value="https://example.com">
    <div class="form-row">
      <input type="number" id="connections" placeholder="Connections" value="100">
      <input type="number" id="duration" placeholder="Duration (s)" value="10">
    </div>
    <div class="form-row">
      <input type="number" id="pipelining" placeholder="Pipelining" value="1">
      <input type="number" id="workers" placeholder="Workers" value="1">
    </div>
    <button id="attackBtn">🔥 LAUNCH ATTACK</button>
    <button id="stopBtn" class="stop-btn" disabled>⏹ STOP ATTACK</button>
  </div>
  <div class="card">
    <h2>📊 LIVE STATISTICS</h2>
    <div class="stats-grid">
      <div class="stat"><div class="stat-label">Total Requests</div><div class="stat-value" id="liveRequests">0</div></div>
      <div class="stat"><div class="stat-label">Errors</div><div class="stat-value" id="liveErrors">0</div></div>
      <div class="stat"><div class="stat-label">RPS</div><div class="stat-value" id="liveRps">0</div></div>
      <div class="stat"><div class="stat-label">Throughput</div><div class="stat-value" id="liveThroughput">0 MB/s</div></div>
    </div>
    <div id="finalStats" style="display:none; margin-top:20px;">
      <h3>🎯 Final Statistics (from autocannon)</h3>
      <div class="stats-grid">
        <div class="stat"><div class="stat-label">Total Requests</div><div class="stat-value" id="finalRequests">0</div></div>
        <div class="stat"><div class="stat-label">Avg RPS</div><div class="stat-value" id="finalRps">0</div></div>
        <div class="stat"><div class="stat-label">Avg Latency</div><div class="stat-value" id="finalAvgLat">0 ms</div></div>
        <div class="stat"><div class="stat-label">Max Latency</div><div class="stat-value" id="finalMaxLat">0 ms</div></div>
        <div class="stat"><div class="stat-label">p99 Latency</div><div class="stat-value" id="finalP99">0 ms</div></div>
        <div class="stat"><div class="stat-label">Errors</div><div class="stat-value" id="finalErrors">0</div></div>
        <div class="stat"><div class="stat-label">Throughput</div><div class="stat-value" id="finalThroughput">0 MB/s</div></div>
      </div>
    </div>
  </div>
  <div class="card">
    <h2>📡 LIVE LOG</h2>
    <div id="log" class="log">[system] Ready</div>
  </div>
</div>
<script>
  let eventSource = null;
  let attackInProgress = false;

  const attackBtn = document.getElementById('attackBtn');
  const stopBtn = document.getElementById('stopBtn');
  const logDiv = document.getElementById('log');

  function addLog(msg) {
    const p = document.createElement('p');
    p.textContent = msg;
    logDiv.appendChild(p);
    logDiv.scrollTop = logDiv.scrollHeight;
  }

  function updateLiveStats(stats) {
    document.getElementById('liveRequests').innerText = stats.requests.toLocaleString();
    document.getElementById('liveErrors').innerText = stats.errors;
    document.getElementById('liveRps').innerText = stats.rps;
    document.getElementById('liveThroughput').innerText = stats.throughput + ' MB/s';
  }

  function displayFinalStats(stats) {
    document.getElementById('finalRequests').innerText = stats.requests.toLocaleString();
    document.getElementById('finalRps').innerText = Math.round(stats.avgRps);
    document.getElementById('finalAvgLat').innerText = Math.round(stats.avgLatency) + ' ms';
    document.getElementById('finalMaxLat').innerText = Math.round(stats.maxLatency) + ' ms';
    document.getElementById('finalP99').innerText = Math.round(stats.p99) + ' ms';
    document.getElementById('finalErrors').innerText = stats.errors;
    const mbps = (stats.throughput / 1024 / 1024).toFixed(2);
    document.getElementById('finalThroughput').innerText = mbps + ' MB/s';
    document.getElementById('finalStats').style.display = 'block';
  }

  function setupEventSource() {
    if (eventSource) eventSource.close();
    eventSource = new EventSource('/api/stream');
    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'log') {
        addLog(data.message);
      } else if (data.type === 'stats') {
        updateLiveStats(data.stats);
      } else if (data.type === 'done') {
        addLog('✅ Attack completed. Fetching final statistics...');
      }
    };
    eventSource.onerror = () => {
      addLog('⚠️ Live log connection lost. Attack may still be running.');
    };
  }

  attackBtn.onclick = async () => {
    if (attackInProgress) return;
    const url = document.getElementById('url').value.trim();
    if (!url) return addLog('❌ URL kosong!');
    const connections = document.getElementById('connections').value;
    const duration = document.getElementById('duration').value;
    const pipelining = document.getElementById('pipelining').value;
    const workers = document.getElementById('workers').value;
    attackBtn.disabled = true;
    stopBtn.disabled = false;
    document.getElementById('finalStats').style.display = 'none';
    attackInProgress = true;
    addLog(`🚀 Sending attack request to ${url} (conn=${connections}, dur=${duration}s)`);
    setupEventSource();
    try {
      const response = await fetch('/api/attack', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, connections, duration, pipelining, workers })
      });
      const data = await response.json();
      if (data.success) {
        addLog('✅ Attack finished. Displaying final stats.');
        displayFinalStats(data.stats);
      } else {
        addLog(`❌ Error: ${data.error}`);
      }
    } catch (err) {
      addLog(`❌ Request failed: ${err.message}`);
    } finally {
      attackInProgress = false;
      attackBtn.disabled = false;
      stopBtn.disabled = true;
      if (eventSource) eventSource.close();
      // Reset live stats after attack (optional)
      updateLiveStats({ requests: 0, errors: 0, rps: 0, throughput: 0 });
    }
  };

  stopBtn.onclick = async () => {
    addLog('⏹ Sending stop command...');
    try {
      const res = await fetch('/api/stop', { method: 'POST' });
      const data = await res.json();
      addLog(data.message || 'Stopped');
    } catch (err) {
      addLog(`❌ Stop failed: ${err.message}`);
    } finally {
      attackInProgress = false;
      attackBtn.disabled = false;
      stopBtn.disabled = true;
    }
  };
</script>
</body>
</html>
